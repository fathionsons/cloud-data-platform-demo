name: "mini_cloud_data_platform"
version: "1.0.0"
config-version: 2
profile: "mini_cloud_data_platform"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  bronze_glob: "data/bronze/open_meteo/*.ndjson"

models:
  mini_cloud_data_platform:
    +persist_docs:
      relation: true
      columns: true
    bronze:
      +schema: bronze
      +materialized: view
    silver:
      +schema: silver
      +materialized: table
    gold:
      +schema: gold
      +materialized: table
